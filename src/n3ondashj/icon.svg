<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020208"/>
      <stop offset="100%" stop-color="#0a0a2a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ff"/>
      <stop offset="100%" stop-color="#08f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#0ff" stroke-width="1" opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Platform -->
  <rect x="80" y="360" width="352" height="12" rx="2" fill="#0ff" opacity="0.3"/>
  <line x1="80" y1="360" x2="432" y2="360" stroke="#0ff" stroke-width="3" opacity="0.8"/>
  <!-- Spike -->
  <polygon points="380,360 395,330 410,360" fill="#f05" opacity="0.7"/>
  <!-- Stickman runner -->
  <g stroke="url(#glow)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.95">
    <!-- Head -->
    <circle cx="220" cy="240" r="22" stroke-width="7"/>
    <!-- Body -->
    <line x1="220" y1="262" x2="220" y2="320"/>
    <!-- Legs (running) -->
    <line x1="220" y1="320" x2="195" y2="355"/>
    <line x1="220" y1="320" x2="248" y2="350"/>
    <!-- Arms -->
    <line x1="220" y1="280" x2="195" y2="260"/>
    <line x1="220" y1="280" x2="250" y2="300"/>
  </g>
  <!-- Trail -->
  <circle cx="180" cy="290" r="8" fill="#0ff" opacity="0.3"/>
  <circle cx="155" cy="295" r="6" fill="#0ff" opacity="0.2"/>
  <circle cx="135" cy="298" r="4" fill="#0ff" opacity="0.1"/>
  <!-- Glow behind runner -->
  <circle cx="220" cy="290" r="50" fill="#0ff" opacity="0.06"/>
  <!-- N3ON text -->
  <text x="256" y="450" text-anchor="middle" font-family="monospace" font-size="52" font-weight="900" fill="#fff" letter-spacing="4">n3ondashj</text>
  <!-- Accent underline -->
  <line x1="130" y1="462" x2="382" y2="462" stroke="#f0f" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
