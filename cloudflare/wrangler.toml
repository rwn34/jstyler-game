name = "ndj-metrics"
main = "src/index.js"
compatibility_date = "2024-09-01"

[vars]
DASHBOARD_KEY = "qwepoi123098"
SYNC_SALT = "ndj-sync-v1-salt"
# ENCRYPTION_KEY must be exactly 64 hex characters (32 bytes) for AES-256-GCM.
# Generate a random one with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
ENCRYPTION_KEY = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# Allow importing HTML files as raw text
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.bundle.js"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

# After running `npx wrangler d1 create ndj-metrics-db`,
# paste the database_id from the output below
[[d1_databases]]
binding = "DB"
database_name = "ndj-metrics-db"
database_id = "74d7bb68-78f3-4189-8183-91618c1ebe03"

[triggers]
crons = ["0 * * * *"]
