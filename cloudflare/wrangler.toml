name = "ndj-metrics"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Secrets (set via `wrangler secret put <NAME>` — DO NOT commit values here):
#   DASHBOARD_KEY      — dashboard auth password
#   SYNC_SALT          — HMAC salt for sync key hashing
#   ENCRYPTION_KEY     — 64-hex-char AES-256-GCM key for cloud save encryption
#   ENCRYPTION_KEY_LEGACY — previous encryption key (dual-key window during rotation)
#
# Generate ENCRYPTION_KEY: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"

# Allow importing HTML files as raw text
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.bundle.js"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

# After running `npx wrangler d1 create ndj-metrics-db`,
# paste the database_id from the output below
[[d1_databases]]
binding = "DB"
database_name = "ndj-metrics-db"
database_id = "74d7bb68-78f3-4189-8183-91618c1ebe03"

[triggers]
crons = ["0 * * * *"]
