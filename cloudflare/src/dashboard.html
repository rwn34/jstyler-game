<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>N3ON DashJ — Live Metrics</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:linear-gradient(180deg,#020208,#0a0a1a 50%,#1a0a2a);color:#fff;min-height:100vh;padding:16px;line-height:1.4}
  h1{font-size:1.4rem;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#0ff,#08f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 8px rgba(0,255,255,.3)}
  h1 .sub{font-size:.55rem;letter-spacing:5px;color:#888;margin-left:8px;-webkit-text-fill-color:#888}
  h2{font-size:.85rem;font-weight:700;color:#0ff;letter-spacing:2px;margin:16px 0 8px;text-transform:uppercase}
  h3{font-size:.7rem;font-weight:700;color:#aaa;letter-spacing:1px;margin:12px 0 6px;text-transform:uppercase}
  #status{font-size:.65rem;color:#666;font-family:monospace;margin-top:4px;margin-bottom:12px}
  #status .live{color:#0f8;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,229,255,.15);margin-bottom:12px}
  .toolbar .label{font-size:.55rem;color:#666;letter-spacing:1px;margin-right:6px}
  .range-btn{padding:5px 10px;font-size:.65rem;font-weight:700;letter-spacing:1px;color:#888;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;cursor:pointer;transition:all .15s;font-family:inherit}
  .range-btn:hover{color:#0ff;border-color:rgba(0,255,255,.3)}
  .range-btn.active{color:#0ff;background:rgba(0,255,255,0.15);border-color:#0ff}
  .check-btn{margin-left:auto;padding:5px 12px;font-size:.65rem;font-weight:700;letter-spacing:1px;color:#0ff;background:rgba(0,255,255,0.1);border:1px solid #0ff;border-radius:4px;cursor:pointer;font-family:inherit}
  .check-btn:hover{background:rgba(0,255,255,0.2)}

  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid rgba(0,229,255,.15);margin-bottom:14px}
  .tab{padding:8px 16px;font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:#888;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;text-transform:uppercase}
  .tab:hover{color:#0ff}
  .tab.active{color:#0ff;border-bottom-color:#0ff;text-shadow:0 0 6px rgba(0,255,255,.4)}
  .pane{display:none}
  .pane.active{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .card{background:rgba(0,0,0,0.4);border:1px solid rgba(0,229,255,0.2);border-radius:10px;padding:14px 12px;backdrop-filter:blur(8px);transition:all .3s}
  .card:hover{border-color:rgba(0,229,255,0.5);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,229,255,0.15)}
  .card .lbl{font-size:.55rem;letter-spacing:1.5px;color:#888;text-transform:uppercase;margin-bottom:6px}
  .card .val{font-size:1.5rem;font-weight:900;color:#0ff;font-family:monospace;letter-spacing:1px;text-shadow:0 0 8px rgba(0,255,255,.4)}
  .card.gold .val{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.4)}
  .card.live .val{color:#0f8;text-shadow:0 0 8px rgba(0,255,136,.4)}
  .card.warn .val{color:#fa0;text-shadow:0 0 8px rgba(255,170,0,.4)}
  .card.bad .val{color:#f44;text-shadow:0 0 8px rgba(255,68,68,.4)}
  .card .pct{font-size:.6rem;color:#0f8;margin-top:4px;font-family:monospace}

  .panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;backdrop-filter:blur(8px);margin-top:10px}
  .types{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:8px}
  .type-card{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;border:1px solid rgba(255,255,255,0.04)}
  .type-card .lbl{font-size:.55rem;color:#888;letter-spacing:1px;text-transform:uppercase;font-family:monospace}
  .type-card .val{font-size:1rem;color:#0ff;font-weight:800;font-family:monospace;margin-top:2px}

  .bar-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-family:monospace;font-size:.7rem}
  .bar-row .label{flex:0 0 110px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-row .bar{flex:1;height:14px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;position:relative;min-width:30px}
  .bar-row .bar-fill{height:100%;background:linear-gradient(90deg,#0ff,#08f);box-shadow:0 0 6px rgba(0,255,255,.5);transition:width .5s ease}
  .bar-row .bar-fill.gold{background:linear-gradient(90deg,#ffd700,#ff8c00);box-shadow:0 0 6px rgba(255,215,0,.5)}
  .bar-row .bar-fill.red{background:linear-gradient(90deg,#f44,#a00);box-shadow:0 0 6px rgba(255,68,68,.5)}
  .bar-row .count{flex:0 0 70px;color:#fff;font-weight:700;text-align:right}

  table{width:100%;border-collapse:collapse;font-size:.65rem;font-family:monospace;margin-top:6px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.06)}
  th{color:#888;font-weight:600;letter-spacing:1px;font-size:.55rem;text-transform:uppercase;background:rgba(0,255,255,0.04)}
  td{color:#ccc}
  td .pid{color:#666;font-size:.55rem}
  td.num{color:#0ff;text-align:right;font-weight:700}
  td.gold{color:#ffd700;text-align:right;font-weight:700}
  td.warn{color:#fa0;text-align:right;font-weight:700}
  tr:hover td{background:rgba(0,255,255,.03)}
  .scroll-x{overflow-x:auto}

  .heatmap{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;margin-top:8px}
  .heat-cell{aspect-ratio:1;border-radius:2px;background:rgba(0,255,255,.05);position:relative;font-size:.45rem;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}

  /* Sparkline-style chart */
  .chart{display:flex;align-items:flex-end;gap:2px;height:80px;margin-top:8px}
  .chart .bar{flex:1;background:linear-gradient(180deg,#0ff,#08f);border-radius:2px 2px 0 0;min-height:1px;position:relative;cursor:pointer;transition:all .2s}
  .chart .bar.gold{background:linear-gradient(180deg,#ffd700,#ff8c00)}
  .chart .bar.red{background:linear-gradient(180deg,#f44,#a00)}
  .chart .bar:hover{filter:brightness(1.5)}
  .chart .bar:hover::after{content:attr(data-val);position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.6rem;background:rgba(0,0,0,.9);padding:2px 6px;border-radius:3px;white-space:nowrap;color:#0ff}

  .feed-item{display:grid;grid-template-columns:75px 110px 1fr 100px;gap:8px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.65rem;font-family:monospace}
  .feed-item:hover{background:rgba(0,255,255,.03)}
  .feed-item .ago{color:#666}
  .feed-item .type{color:#0ff;font-weight:700}
  .feed-item .type.death{color:#f80}
  .feed-item .type.complete{color:#0f8}
  .feed-item .type.purchase{color:#ffd700}
  .feed-item .type.ui_event{color:#a0f}
  .feed-item .who{color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .feed-item .meta{color:#666;text-align:right;font-size:.55rem}

  .footer{margin-top:20px;padding:10px 0;text-align:center;font-size:.55rem;color:#444;font-family:monospace;letter-spacing:1px}
  .err{color:#f44;font-weight:700}
  .badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.5rem;font-weight:700;letter-spacing:1px;background:rgba(0,255,255,.15);color:#0ff}
  .badge.warn{background:rgba(255,170,0,.15);color:#fa0}
  .badge.gold{background:rgba(255,215,0,.15);color:#ffd700}
  .badge.bad{background:rgba(255,68,68,.15);color:#f44}
  .badge.green{background:rgba(0,255,136,.15);color:#0f8}

  .filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .chip{padding:4px 10px;font-size:.6rem;font-weight:700;letter-spacing:1px;color:#888;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;font-family:inherit}
  .chip:hover{color:#0ff}
  .chip.active{color:#0ff;background:rgba(0,255,255,0.15);border-color:#0ff}

  @media (min-width:780px){body{padding:24px 32px;max-width:1280px;margin:0 auto}h1{font-size:1.8rem}}
</style>
</head>
<body>
  <h1>★ N3ON DashJ <span class="sub">LIVE METRICS</span></h1>
  <div id="status"><span class="live">●</span> connecting…</div>

  <div class="toolbar">
    <span class="label">RANGE:</span>
    <button class="range-btn" data-range="1d">1D</button>
    <button class="range-btn active" data-range="2d">2D</button>
    <button class="range-btn" data-range="3d">3D</button>
    <button class="range-btn" data-range="7d">7D</button>
    <button class="range-btn" data-range="14d">14D</button>
    <button class="range-btn" data-range="31d">31D</button>
    <button class="range-btn" data-range="all">ALL</button>
    <button class="check-btn" id="checkNowBtn">⟳ CHECK NOW</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="levels">Per Level</button>
    <button class="tab" data-tab="players">Per Player</button>
    <button class="tab" data-tab="sessions">Sessions</button>
    <button class="tab" data-tab="engagement">Engagement</button>
    <button class="tab" data-tab="economy">Economy</button>
    <button class="tab" data-tab="dailystage">🔥 Daily</button>
    <button class="tab" data-tab="feed">Live Feed</button>
    <button class="tab" data-tab="appversion">App Ver</button>
    <button class="tab" data-tab="feedback">Feedback</button>
    <button class="tab" data-tab="sync">Cloud Sync</button>
  </div>

  <div class="pane active" id="pane-overview"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-levels"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-players"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-sessions"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-engagement"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-economy"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-dailystage"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-feed"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-appversion"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-feedback"><div style="color:#666">Loading…</div></div>
  <div class="pane" id="pane-sync"><div style="color:#666">Loading…</div></div>

  <div class="footer">N3ON DashJ Metrics • 5-min cache • Times in UTC+7 • <span id="lastUpdate">—</span></div>

<!-- Player Detail Modal -->
<div id="playerModal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(2,2,8,0.95);overflow-y:auto;padding:16px;">
  <div style="max-width:1100px;margin:0 auto;">
    <button onclick="closePlayer()" style="position:sticky;top:0;float:right;background:rgba(255,68,68,0.2);border:1px solid #f44;color:#f44;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:monospace;font-weight:700;font-size:.7rem;letter-spacing:1px;z-index:10">✕ CLOSE</button>
    <h1 style="margin-bottom:6px">★ Player Profile</h1>
    <div id="playerHeader" style="font-family:monospace;font-size:.75rem;color:#aaa;margin-bottom:14px"></div>
    <div id="playerBody"><div style="color:#666;font-family:monospace">Loading…</div></div>
  </div>
</div>

<script>
(function(){
  var qs = new URLSearchParams(window.location.search);
  var API = qs.get('api') || window.location.origin;
  var TZ = 'Asia/Bangkok';

  var LEVEL_NAMES = ['Neon Abyss','Cyber Rain','Crystal Spire','Magma Core','Toxic Swamp','Void Walker','Solar Flare','Deep Ocean','Voltage','Rust Belt','Frost Byte','Aurora Veil','Bio Lab','Dust Storm','Mirror City','Glitch Zone','Starlight','Ghost Line','Obsidian','Terminal'];
  var LEVEL_DIFFS = ['STARTER','STARTER','SIMPLE','SIMPLE','SIMPLE','SIMPLE','MODERATE','MODERATE','MODERATE','MODERATE','MODERATE','MODERATE','MODERATE','MODERATE','HARD','HARD','HARD','HARD','HARD','HARD'];
  var COUNTRY_FLAGS={US:'🇺🇸',ID:'🇮🇩',JP:'🇯🇵',GB:'🇬🇧',DE:'🇩🇪',FR:'🇫🇷',IN:'🇮🇳',BR:'🇧🇷',MX:'🇲🇽',CA:'🇨🇦',AU:'🇦🇺',KR:'🇰🇷',CN:'🇨🇳',SG:'🇸🇬',MY:'🇲🇾',TH:'🇹🇭',VN:'🇻🇳',PH:'🇵🇭',NL:'🇳🇱',IT:'🇮🇹',ES:'🇪🇸',RU:'🇷🇺',TR:'🇹🇷'};

  var fmtNum=function(n){return (n||0).toLocaleString();};
  var fmtMs=function(ms){if(!ms)return '—';return (ms/1000).toFixed(2)+'s';};
  var fmtMin=function(m){if(!m)return '0m';if(m<60)return Math.round(m)+'m';return Math.floor(m/60)+'h '+Math.round(m%60)+'m';};
  var fmtTime=function(ts){return new Date(ts).toLocaleTimeString('en-GB',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});};
  var fmtDate=function(ts){return new Date(ts).toLocaleDateString('en-GB',{timeZone:TZ,month:'short',day:'numeric'});};
  var fmtDateTime=function(ts){return new Date(ts).toLocaleString('en-GB',{timeZone:TZ,year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});};
  var fmtAgo=function(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
  var truncatePid=function(pid){return pid?pid.slice(0,12)+(pid.length>12?'…':''):'—';};
  var escapeHtml=function(str){if(str==null)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');};

  // State
  var currentRange = localStorage.getItem('ndj_range') || '2d';
  var currentTab = 'overview';
  var lastLoaded = {}; // tab -> timestamp

  // Set initial range button
  document.querySelectorAll('.range-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.range === currentRange);
    b.addEventListener('click', function(){
      currentRange = b.dataset.range;
      localStorage.setItem('ndj_range', currentRange);
      document.querySelectorAll('.range-btn').forEach(function(x){x.classList.toggle('active', x === b);});
      lastLoaded = {}; // invalidate
      loadTab(currentTab);
    });
  });
  document.getElementById('checkNowBtn').addEventListener('click', function(){
    lastLoaded = {};
    loadTab(currentTab, true);
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelectorAll('.pane').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      currentTab = b.dataset.tab;
      document.getElementById('pane-'+currentTab).classList.add('active');
      loadTab(currentTab);
    });
  });

  function fetchJson(path, force){
    var sep = path.indexOf('?')>=0 ? '&' : '?';
    var url = API + path + sep + 'range=' + currentRange + (force?'&force=1':'');
    return fetch(url, {cache:'no-store', credentials:'same-origin'}).then(function(r){
      if (r.status === 401) {
        location.href = '/'; throw new Error('unauthorized');
      }
      if (!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(j){
      if (!j.ok) throw new Error(j.error||'API error');
      return j.data;
    });
  }

  function status(s){document.getElementById('status').innerHTML = s;}
  function statusOk(){var t=fmtTime(Date.now());status('<span class="live">●</span> Live • Updated '+t+' UTC+7 • Range '+currentRange.toUpperCase());document.getElementById('lastUpdate').textContent='Updated '+t;}
  function statusErr(e){status('<span class="err">●</span> Error: '+e.message);}

  function loadTab(tab, force){
    // Cache for 4 minutes client-side too
    if (!force && lastLoaded[tab] && Date.now() - lastLoaded[tab] < 4*60*1000) return;
    if (tab==='overview') loadOverview(force);
    else if (tab==='levels') loadLevels(force);
    else if (tab==='players') loadPlayers(force);
    else if (tab==='sessions') loadSessions(force);
    else if (tab==='engagement') loadEngagement(force);
    else if (tab==='economy') loadEconomy(force);
    else if (tab==='dailystage') loadDailyStage(force);
    else if (tab==='feed') loadFeed(force);
    else if (tab==='appversion') loadAppVersion(force);
    else if (tab==='feedback') loadFeedback(force);
    else if (tab==='sync') loadSync(force);
  }

  // === OVERVIEW ===
  function loadOverview(force){
    fetchJson('/stats', force).then(function(d){
      lastLoaded.overview = Date.now();
      var html = '';
      html += '<div class="grid">';
      html += card('Online Now', fmtNum(d.online), 'live', 'last 5 min');
      html += card('Active in Range', fmtNum(d.activeInRange), '', 'unique players');
      html += card('New Players', fmtNum(d.newPlayers), 'green', '');
      html += card('Returning', fmtNum(d.returningPlayers), 'gold', '');
      html += '</div>';

      html += '<div class="grid" style="margin-top:8px">';
      html += card('Total Mins (New)', fmtNum(d.totalMinutesNew), 'green', 'across all new');
      html += card('Total Mins (Ret.)', fmtNum(d.totalMinutesReturning), 'gold', 'across returning');
      html += card('Median Mins (New)', d.medianMinutesNew + 'm', 'green', 'per player (typical)');
      html += card('Median Mins (Ret.)', d.medianMinutesReturning + 'm', 'gold', 'per player (typical)');
      html += '</div>';

      html += '<div class="grid" style="margin-top:8px">';
      html += card('Win Matches', fmtNum(d.winMatches), 'live', '');
      html += card('Death Matches', fmtNum(d.deathMatches), 'warn', '');
      var winRate = (d.winMatches+d.deathMatches)>0 ? Math.round(d.winMatches/(d.winMatches+d.deathMatches)*100) : 0;
      html += card('Win Rate', winRate+'%', winRate>50?'live':'warn', '');
      html += card('Total Mins Played', fmtNum(d.totalMinutes), '', 'all players');
      html += '</div>';

      html += '<div class="grid" style="margin-top:8px">';
      html += card('Total Events', fmtNum(d.totalEvents), '', '');
      html += card('Verified', fmtNum(d.verified), '', (d.totalEvents>0?Math.round(d.verified/d.totalEvents*100):0)+'% of total');
      html += card('Unverified', fmtNum(d.unverified), 'warn', '');
      html += card('Total Players', fmtNum(d.totalPlayers), 'gold', 'all-time');
      html += '</div>';

      // Funnel: trial → named players
      var convertRate = (d.anonPlayers + d.namedPlayers) > 0 ? Math.round(d.namedPlayers / (d.anonPlayers + d.namedPlayers) * 100) : 0;
      html += '<div class="grid" style="margin-top:8px">';
      html += card('Named Players', fmtNum(d.namedPlayers), 'live', 'completed onboarding');
      html += card('Trial / Bounced', fmtNum(d.anonPlayers), 'warn', 'never named');
      html += card('Name-Set Conv.', convertRate+'%', convertRate>50?'live':'warn', 'named ÷ total active');
      html += card('Name-Set Events', fmtNum(d.nameSetEvents), 'gold', 'naming actions in range');
      html += '</div>';

      html += '<h2>Today\'s Activity</h2><div class="panel"><div class="types">';
      var types = ['session_start','heartbeat','level_start','level_complete','level_death','purchase','ui_event'];
      for (var i=0;i<types.length;i++){
        var t = types[i], n = (d.today[t]||0);
        html += '<div class="type-card"><div class="lbl">'+t.replace(/_/g,' ')+'</div><div class="val">'+fmtNum(n)+'</div></div>';
      }
      html += '</div></div>';

      html += '<h2>Range Activity (events per day)</h2><div class="panel">'+renderDayChart(d.last7Days)+'</div>';

      html += '<h2>Popular Levels</h2><div class="panel">'+renderLevelBars(d.popularLevels, 'c', false)+'</div>';
      html += '<h2>Deaths Per Level</h2><div class="panel">'+renderLevelBars(d.deathsByLevel, 'c', true)+'</div>';

      document.getElementById('pane-overview').innerHTML = html;
      statusOk();
    }).catch(statusErr);
  }

  function card(label, val, cls, hint){
    return '<div class="card '+(cls||'')+'"><div class="lbl">'+label+'</div><div class="val">'+val+'</div>'+(hint?'<div class="pct">'+hint+'</div>':'')+'</div>';
  }

  function renderDayChart(arr){
    if (!arr || !arr.length) return '<div style="color:#666">No data</div>';
    var max = Math.max.apply(null, arr.concat([1]));
    var dayMs = 86400000, now = new Date();
    var html = '<div class="chart">';
    for (var i=0;i<arr.length;i++){
      var pct = (arr[i]/max)*100;
      var d = new Date(now.getTime() - (arr.length-1-i)*dayMs);
      html += '<div class="bar" data-val="'+fmtDate(d.getTime())+': '+fmtNum(arr[i])+'" style="height:'+pct+'%"></div>';
    }
    html += '</div>';
    return html;
  }

  function renderLevelBars(rows, key, red){
    if (!rows || !rows.length) return '<div style="color:#666;font-size:.7rem">No data</div>';
    var max = 0;
    for (var i=0;i<rows.length;i++) if (rows[i][key] > max) max = rows[i][key];
    var html = '';
    for (var i=0;i<rows.length;i++){
      var r = rows[i], pct = max>0?(r[key]/max)*100:0;

  function renderTimeSeries(earn, spent, kind){
    if (!earn || !earn.length) return '<div style="color:#666">No data</div>';
    var n = earn.length;
    var max = Math.max(Math.max.apply(null, earn.concat([1])), Math.max.apply(null, spent.concat([1])));
    var W = 760, H = 140, P = 28;
    var stepX = (W - P*2) / Math.max(1, n - 1);
    function pt(arr, i){
      var x = P + i * stepX;
      var y = H - P - ((arr[i]||0) / max) * (H - P*2);
      return x + ',' + y;
    }
    var earnPath = [], spentPath = [];
    for (var i=0;i<n;i++){ earnPath.push(pt(earn, i)); spentPath.push(pt(spent, i)); }

    var earnColor = kind==='gold' ? '#ffd700' : '#0ff';
    var earnGlow = kind==='gold' ? 'rgba(255,215,0,.5)' : 'rgba(0,255,255,.5)';

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block">';
    // Y grid
    for (var g=0; g<=4; g++){
      var gy = P + g * (H - P*2) / 4;
      var gv = Math.round(max * (1 - g/4));
      svg += '<line x1="'+P+'" y1="'+gy+'" x2="'+(W-P)+'" y2="'+gy+'" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>';
      svg += '<text x="'+(P-4)+'" y="'+(gy+3)+'" fill="#666" font-size="9" font-family="monospace" text-anchor="end">'+fmtNum(gv)+'</text>';
    }
    // Earned line
    svg += '<polyline points="'+earnPath.join(' ')+'" fill="none" stroke="'+earnColor+'" stroke-width="2" filter="drop-shadow(0 0 4px '+earnGlow+')"/>';
    // Spent line (red)
    svg += '<polyline points="'+spentPath.join(' ')+'" fill="none" stroke="#f44" stroke-width="2" stroke-dasharray="4,3" opacity="0.85"/>';
    // Points + tooltips
    for (var i=0;i<n;i++){
      var dt = new Date(Date.now() - (n-1-i)*86400000);
      var lbl = fmtDate(dt.getTime());
      var ex = P + i * stepX, ey = H - P - ((earn[i]||0) / max) * (H - P*2);
      var sx = ex, sy = H - P - ((spent[i]||0) / max) * (H - P*2);
      svg += '<circle cx="'+ex+'" cy="'+ey+'" r="3" fill="'+earnColor+'"><title>'+lbl+': earned '+fmtNum(earn[i]||0)+'</title></circle>';
      svg += '<circle cx="'+sx+'" cy="'+sy+'" r="3" fill="#f44"><title>'+lbl+': spent '+fmtNum(spent[i]||0)+'</title></circle>';
    }
    // X axis day labels (first, mid, last)
    var labelIdx = n <= 4 ? Array.from({length:n},function(_,k){return k;}) : [0, Math.floor(n/2), n-1];
    labelIdx.forEach(function(i){
      var dt = new Date(Date.now() - (n-1-i)*86400000);
      var x = P + i * stepX;
      svg += '<text x="'+x+'" y="'+(H-6)+'" fill="#888" font-size="9" font-family="monospace" text-anchor="middle">'+fmtDate(dt.getTime())+'</text>';
    });
    svg += '</svg>';
    var legend = '<div style="font-size:.55rem;color:#888;margin-top:4px;font-family:monospace;display:flex;gap:14px"><span style="color:'+earnColor+'">— earned</span><span style="color:#f44">— spent</span></div>';
    return svg + legend;
  }
  function renderSingleSeries(arr, kind){
    if (!arr || !arr.length) return '<div style="color:#666">No data</div>';
    var n = arr.length;
    var min = Math.min.apply(null, arr), max = Math.max.apply(null, arr);
    if (max === min) max = min + 1;
    var W = 760, H = 100, P = 28;
    var stepX = (W - P*2) / Math.max(1, n - 1);
    var color = kind==='gold' ? '#ffd700' : '#0ff';
    var glow = kind==='gold' ? 'rgba(255,215,0,.4)' : 'rgba(0,255,255,.4)';
    var pts = [];
    for (var i=0;i<n;i++){
      var x = P + i * stepX;
      var y = H - P - ((arr[i] - min)/(max - min)) * (H - P*2);
      pts.push(x + ',' + y);
    }
    // Build a filled area: extend polyline to bottom corners
    var area = pts.slice();
    area.push((P + (n-1)*stepX) + ',' + (H - P));
    area.push(P + ',' + (H - P));

    var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block">';
    for (var g=0; g<=3; g++){
      var gy = P + g * (H - P*2) / 3;
      var gv = Math.round(max - g * (max - min) / 3);
      svg += '<line x1="'+P+'" y1="'+gy+'" x2="'+(W-P)+'" y2="'+gy+'" stroke="rgba(255,255,255,0.05)"/>';
      svg += '<text x="'+(P-4)+'" y="'+(gy+3)+'" fill="#666" font-size="9" font-family="monospace" text-anchor="end">'+fmtNum(gv)+'</text>';
    }
    svg += '<polygon points="'+area.join(' ')+'" fill="'+color+'" fill-opacity="0.1"/>';
    svg += '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2" filter="drop-shadow(0 0 4px '+glow+')"/>';
    for (var i=0;i<n;i++){
      var dt = new Date(Date.now() - (n-1-i)*86400000);
      var x = P + i * stepX;
      var y = H - P - ((arr[i] - min)/(max - min)) * (H - P*2);
      svg += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+color+'"><title>'+fmtDate(dt.getTime())+': '+fmtNum(arr[i])+'</title></circle>';
    }
    var labelIdx = n <= 4 ? Array.from({length:n},function(_,k){return k;}) : [0, Math.floor(n/2), n-1];
    labelIdx.forEach(function(i){
      var dt = new Date(Date.now() - (n-1-i)*86400000);
      var x = P + i * stepX;
      svg += '<text x="'+x+'" y="'+(H-6)+'" fill="#888" font-size="9" font-family="monospace" text-anchor="middle">'+fmtDate(dt.getTime())+'</text>';
    });
    svg += '</svg>';
    return svg;
  }
